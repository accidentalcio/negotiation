<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Negotiation Style Assessment (v5)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121830;
      --ink: #eaf0ff;
      --muted: #8b96b8;
      --accent: #6ea8fe;
      --accent-2: #8bd3ff;
      --warn: #ff8a8a;
      --ok: #7de28b;
      --card: #0f1428;
      --border: #1f2747;
      --analyst-color: #7de28b;
      --accommodator-color: #8bd3ff;
      --assertive-color: #f4a96a;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      line-height: 1.65;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 40px 20px 100px; }

    /* Header */
    header { margin-bottom: 36px; border-bottom: 1px solid var(--border); padding-bottom: 28px; }
    h1 { margin: 0 0 8px; font-size: 26px; font-weight: 700; letter-spacing: 0.3px; font-family: system-ui, -apple-system, sans-serif; }
    p.topline { margin: 0; color: var(--muted); font-size: 15px; font-family: system-ui, -apple-system, sans-serif; }
    .style-pills { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
    .pill {
      display: inline-block; padding: 3px 11px;
      border: 1px solid var(--border); border-radius: 999px;
      font-size: 12px; font-family: system-ui, -apple-system, sans-serif;
      color: var(--muted); letter-spacing: 0.3px;
    }

    /* Quiz card */
    .card {
      background: linear-gradient(180deg, var(--panel), var(--card));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .required-note { font-size: 13px; color: var(--muted); margin-bottom: 20px; font-family: system-ui, -apple-system, sans-serif; }
    .item { margin: 0 0 20px; padding: 18px; border: 1px solid var(--border); border-radius: 12px; }
    .item:last-child { margin-bottom: 0; }
    .qnum { font-size: 11px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; font-family: system-ui, -apple-system, sans-serif; }
    .q { font-weight: 600; margin-bottom: 14px; font-size: 15px; font-family: system-ui, -apple-system, sans-serif; }
    .opts { display: grid; gap: 8px; }
    label.opt {
      display: grid; grid-template-columns: 20px 1fr; gap: 10px; align-items: start;
      padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer;
      font-family: system-ui, -apple-system, sans-serif; font-size: 14px;
      transition: border-color 0.15s, background 0.15s;
    }
    label.opt:hover { border-color: var(--accent); background: rgba(110,168,254,0.05); }
    label.opt:has(input:checked) { border-color: var(--accent); background: rgba(110,168,254,0.08); }
    input[type="radio"] { margin-top: 2px; accent-color: var(--accent); }

    /* Submit area */
    .actions {
      position: sticky; bottom: 0;
      background: linear-gradient(180deg, rgba(11,16,32,0), var(--bg) 45%);
      padding-top: 20px; margin-top: 28px;
    }
    button {
      appearance: none; border: none; color: white;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      padding: 14px 26px; font-weight: 700; border-radius: 12px; cursor: pointer;
      box-shadow: 0 8px 20px rgba(110,168,254,0.25);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px; letter-spacing: 0.2px;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    button:disabled { filter: grayscale(0.6); opacity: 0.7; cursor: not-allowed; }
    .error { color: var(--warn); margin-top: 10px; font-size: 14px; font-family: system-ui, -apple-system, sans-serif; }

    /* ---- RESULTS ---- */
    .result {
      margin-top: 28px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(15,20,40,0.6);
    }

    /* Result header band */
    .result-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--border);
    }
    .result-label {
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); font-family: system-ui, -apple-system, sans-serif;
      margin-bottom: 6px;
    }
    .result-title {
      font-size: 24px; font-weight: 700; margin: 0 0 4px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .result-title.analyst   { color: var(--analyst-color); }
    .result-title.accommodator { color: var(--accommodator-color); }
    .result-title.assertive { color: var(--assertive-color); }
    .result-title.tie       { color: var(--ink); }

    /* Score bars */
    .score-bars { padding: 20px 28px; border-bottom: 1px solid var(--border); }
    .score-bars-label {
      font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 14px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .score-row { display: grid; grid-template-columns: 110px 1fr 28px; align-items: center; gap: 12px; margin-bottom: 10px; }
    .score-row:last-child { margin-bottom: 0; }
    .score-name { font-size: 13px; font-family: system-ui, -apple-system, sans-serif; color: var(--muted); text-align: right; }
    .score-track { background: rgba(255,255,255,0.06); border-radius: 4px; height: 8px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .score-fill.analyst        { background: var(--analyst-color); }
    .score-fill.accommodator   { background: var(--accommodator-color); }
    .score-fill.assertive      { background: var(--assertive-color); }
    .score-fill.dominant       { opacity: 1; }
    .score-fill.secondary      { opacity: 0.65; }
    .score-fill.tertiary       { opacity: 0.35; }
    .score-num { font-size: 12px; color: var(--muted); font-family: system-ui, -apple-system, sans-serif; text-align: right; }

    /* Profile sections */
    .profile-body { padding: 28px; }
    .profile-section { margin-bottom: 26px; }
    .profile-section:last-child { margin-bottom: 0; }
    .profile-section-head {
      font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .profile-section p { margin: 0; font-size: 15px; line-height: 1.7; }

    /* Stress note callout */
    .stress-note {
      background: rgba(110,168,254,0.07);
      border: 1px solid rgba(110,168,254,0.2);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 26px;
    }
    .stress-note-head {
      font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--accent); margin-bottom: 6px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .stress-note p { margin: 0; font-size: 14px; line-height: 1.65; color: #c8d8f5; }

    /* Strengths block */
    .strengths-block {
      background: rgba(125,226,139,0.05);
      border: 1px solid rgba(125,226,139,0.18);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 26px;
    }
    .strengths-block.accommodator { background: rgba(139,211,255,0.05); border-color: rgba(139,211,255,0.18); }
    .strengths-block.assertive    { background: rgba(244,169,106,0.05); border-color: rgba(244,169,106,0.18); }
    .strengths-head {
      font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .strengths-block p { margin: 0; font-size: 14px; line-height: 1.65; }

    /* Silence block */
    .silence-block {
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-left: 3px solid var(--muted);
      border-radius: 0 10px 10px 0;
      padding: 14px 16px;
      margin-bottom: 26px;
    }
    .silence-head {
      font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .silence-block p { margin: 0; font-size: 14px; line-height: 1.65; }

    /* Failure block */
    .failure-block {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 26px;
    }
    .failure-block-head {
      font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--muted); padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      font-family: system-ui, -apple-system, sans-serif;
    }
    .failure-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .failure-section:last-child { border-bottom: none; }
    .failure-section-label {
      font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px; opacity: 0.7;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .failure-section p { margin: 0; font-size: 14px; line-height: 1.65; }
    .failure-section.prescription { background: rgba(255,255,255,0.015); }
    .failure-section.prescription .failure-section-label { color: var(--accent); opacity: 1; }

    /* Secondary style block */
    .secondary-block {
      border-top: 1px solid var(--border);
      padding-top: 22px;
      margin-top: 6px;
    }
    .secondary-block-head {
      font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .secondary-block p { margin: 0; font-size: 14px; line-height: 1.65; color: #c8d8f5; }

    /* Tie block */
    .tie-block { padding: 28px; }
    .tie-intro { font-size: 15px; margin-bottom: 22px; line-height: 1.7; }
    .tie-styles { display: grid; gap: 16px; }
    .tie-style-card { padding: 16px; border: 1px solid var(--border); border-radius: 10px; }
    .tie-style-name { font-weight: 700; font-size: 14px; margin-bottom: 6px; font-family: system-ui, -apple-system, sans-serif; }
    .tie-style-card p { margin: 0; font-size: 14px; line-height: 1.65; }

    /* Attribution */
    .attribution {
      border-top: 1px solid var(--border);
      padding: 18px 28px;
      font-size: 12px;
      color: var(--muted);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }
    .attribution a { color: var(--accent); text-decoration: none; }
    .attribution a:hover { text-decoration: underline; }

    @media (max-width: 540px) {
      .wrap { padding: 24px 14px 80px; }
      .result-header, .score-bars, .profile-body, .attribution { padding-left: 18px; padding-right: 18px; }
      .score-row { grid-template-columns: 90px 1fr 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Negotiation Style Assessment <span style="font-weight:400; color:var(--muted); font-size:18px;">(v5)</span></h1>
      <p class="topline">Answer all 20 questions by choosing the option closest to how you usually operate. Options are shuffled on each load.</p>
      <div class="style-pills">
        <span class="pill">Analyst</span>
        <span class="pill">Accommodator</span>
        <span class="pill">Assertive</span>
      </div>
    </header>

    <form id="quiz" class="card" novalidate></form>

    <div class="actions">
      <button id="submitBtn" type="button">Submit and Score</button>
      <div id="formError" class="error" role="alert" aria-live="polite"></div>
    </div>

    <div id="result" class="result" hidden style="margin-top: 28px;"></div>
  </div>

  <script>
    const QUESTIONS = [
      { q: "When preparing for a big meeting, you usually:",
        options: [
          { t: "Research the facts thoroughly before deciding", s: "Analyst" },
          { t: "Reach out to people to build rapport ahead of time", s: "Accommodator" },
          { t: "Plan how to clearly state what you want right away", s: "Assertive" },
        ],
      },
      { q: "In a tense discussion, your instinct is to:",
        options: [
          { t: "Stay quiet and think before speaking", s: "Analyst" },
          { t: "Ease the tension with a friendly comment", s: "Accommodator" },
          { t: "Address the issue directly and firmly", s: "Assertive" },
        ],
      },
      { q: "A colleague makes a mistake that affects your work:",
        options: [
          { t: "Review what happened to understand all details", s: "Analyst" },
          { t: "Reassure them and offer help to fix it", s: "Accommodator" },
          { t: "Tell them directly what went wrong and how to fix it", s: "Assertive" },
        ],
      },
      { q: "When given a new project, your first step is to:",
        options: [
          { t: "Gather as much data as possible", s: "Analyst" },
          { t: "Talk to stakeholders to build trust", s: "Accommodator" },
          { t: "Set clear goals and deadlines immediately", s: "Assertive" },
        ],
      },
      { q: "In group decisions, you prefer to:",
        options: [
          { t: "Analyze all options before speaking", s: "Analyst" },
          { t: "Make sure everyone is comfortable and heard", s: "Accommodator" },
          { t: "Push for a decision to keep things moving", s: "Assertive" },
        ],
      },
      { q: "If someone challenges your idea in a meeting:",
        options: [
          { t: "Ask questions to understand their reasoning", s: "Analyst" },
          { t: "Acknowledge their point and find common ground", s: "Accommodator" },
          { t: "Defend your idea strongly and clearly", s: "Assertive" },
        ],
      },
      { q: "When deadlines are tight:",
        options: [
          { t: "Work methodically to avoid mistakes", s: "Analyst" },
          { t: "Coordinate with the team to keep morale up", s: "Accommodator" },
          { t: "Drive the pace and keep people focused", s: "Assertive" },
        ],
      },
      { q: "You get the best results when you:",
        options: [
          { t: "Have time to think through your approach", s: "Analyst" },
          { t: "Build strong relationships first", s: "Accommodator" },
          { t: "Act quickly and decisively", s: "Assertive" },
        ],
      },
      { q: "When faced with incomplete information:",
        options: [
          { t: "Wait until you can get more details", s: "Analyst" },
          { t: "Talk to others to piece together the picture", s: "Accommodator" },
          { t: "Make the best decision you can right now", s: "Assertive" },
        ],
      },
      { q: "If a team member disagrees with you:",
        options: [
          { t: "Request data or examples to understand their view", s: "Analyst" },
          { t: "Explore their perspective to maintain harmony", s: "Accommodator" },
          { t: "Explain why your view makes the most sense", s: "Assertive" },
        ],
      },
      { q: "When someone is upset during a negotiation:",
        options: [
          { t: "Stay calm and return to the facts", s: "Analyst" },
          { t: "Offer empathy and reassurance", s: "Accommodator" },
          { t: "Refocus on the core issue at hand", s: "Assertive" },
        ],
      },
      { q: "Your approach to setting goals is:",
        options: [
          { t: "Set realistic goals based on detailed analysis", s: "Analyst" },
          { t: "Set goals that foster teamwork and relationships", s: "Accommodator" },
          { t: "Set ambitious goals to push performance", s: "Assertive" },
        ],
      },
      { q: "If you are leading a meeting:",
        options: [
          { t: "Prepare an agenda with data points", s: "Analyst" },
          { t: "Include time for team bonding", s: "Accommodator" },
          { t: "Keep it short and to the point", s: "Assertive" },
        ],
      },
      { q: "Your reaction to last-minute changes:",
        options: [
          { t: "Review the impact before responding", s: "Analyst" },
          { t: "Stay positive and help others adapt", s: "Accommodator" },
          { t: "Quickly redirect to meet the new reality", s: "Assertive" },
        ],
      },
      { q: "When someone misses a deadline:",
        options: [
          { t: "Ask for a full explanation of the delay", s: "Analyst" },
          { t: "Show understanding and find a way to support them", s: "Accommodator" },
          { t: "Make it clear this cannot happen again", s: "Assertive" },
        ],
      },
      { q: "In negotiation, you usually focus on:",
        options: [
          { t: "Clarifying every detail", s: "Analyst" },
          { t: "Building goodwill", s: "Accommodator" },
          { t: "Getting to agreement quickly", s: "Assertive" },
        ],
      },
      { q: "If someone is being vague:",
        options: [
          { t: "Request specific details", s: "Analyst" },
          { t: "Encourage them to share more openly", s: "Accommodator" },
          { t: "Push for a direct answer", s: "Assertive" },
        ],
      },
      { q: "When working with new people:",
        options: [
          { t: "Observe and learn their style", s: "Analyst" },
          { t: "Engage in small talk to connect", s: "Accommodator" },
          { t: "Clarify roles and expectations fast", s: "Assertive" },
        ],
      },
      { q: "You feel most comfortable when:",
        options: [
          { t: "The plan is clear and data-backed", s: "Analyst" },
          { t: "Everyone is on good terms", s: "Accommodator" },
          { t: "Progress is being made quickly", s: "Assertive" },
        ],
      },
      { q: "In resolving a conflict:",
        options: [
          { t: "Analyze what caused it", s: "Analyst" },
          { t: "Focus on repairing relationships", s: "Accommodator" },
          { t: "Address it head-on to end it quickly", s: "Assertive" },
        ],
      },
    ];

    // --- Style profile content ---

    const PROFILES = {
      Analyst: {
        colorClass: "analyst",
        orientation: "Your default posture is to understand before acting. You prioritize accuracy and structural completeness, and you treat silence as a working state rather than a problem to solve. In most situations, you want more information before you commit to a position, and you are more likely to ask a clarifying question than to stake out ground before the picture is clear.",
        strengths: "Methodical, deeply prepared, and rarely surprised at the table. You treat an extreme opening offer as inaccurate rather than offensive, which keeps you from reacting when others would. You are typically the person in the room who identifies the structural cause of a problem while everyone else is still arguing about symptoms.",
        natural: "In a negotiation, you ask clarifying questions, return to data when the conversation gets heated, and stay calm when others escalate. That calm is real and useful, but it can read as disengagement to the people in the room. You are most effective when the process is orderly and you have had time to prepare.",
        silence: "Silence is a natural working state for you, not a signal of displeasure or disengagement. You use it to think. The risk is not that you misuse silence; it is that others misread you while you are using it well. They interpret the quiet as withdrawal or indifference. The discipline is to signal that you are still present: a brief 'give me a moment' keeps you in the room and keeps others from filling the space in ways that complicate the negotiation.",
        failure: {
          trigger: "Direct emotional pressure, in public, or under tight time constraints. It can come from any style, but Assertives generate it most reliably. The Analyst's strength is preparation and precision, and their approach depends on orderly process. When a counterpart introduces urgency, emotional heat, or a public audience, that model breaks down.",
          mode: "The Analyst withdraws at precisely the moment the room most needs their voice. They want more data, more time, more certainty before responding. That silence reads as disengagement to everyone else, and the Assertive fills the space by pressing harder. There is a compounding problem: the Analyst's measured, distant delivery can inadvertently trigger the Assertive's escalation instinct, creating exactly the irrational environment the Analyst is least equipped to handle. The Analyst's voice, the one most likely to identify the structural issue, exits the conversation precisely when it matters most.",
          voss: "Name the pressure before retreating from it. Saying something like 'it seems like the timeline is creating urgency on your side' slows the room without confrontation. When direct authority is asserted, acknowledge the directive and then outline the consequences in plain sequence. This restores order to your thinking and gives the other side something concrete to engage rather than an opponent to overwhelm.",
          karrass: "Trust your preparation. If you have done the work, you know the floor. You do not need more time in that moment; you need to act on the preparation you already completed. You do not rise to the occasion under pressure. You fall to your highest level of preparation. The defense against emotional pressure is not more analysis. It is the confidence that comes from preparation finished before the room got hot.",
        },
        stressNote: "Your default behavior becomes most visible when stakes are high and time is short. Under pressure, Analysts tend to go quiet rather than speak from incomplete certainty, and they can miss the window to contribute while waiting for a level of confidence that will not arrive in time.",
      },
      Accommodator: {
        colorClass: "accommodator",
        orientation: "Your default posture centers on the relationship. You treat trust and rapport not just as tools but as genuine goals in themselves, and you are attentive to whether people in the room feel heard and respected. You tend to move toward agreement and away from friction, which makes you effective at maintaining working relationships across time.",
        strengths: "Rapport and listening. You build the relationship first and the negotiation second. You use inclusive language, notice when people feel dismissed, and are the style most likely to sustain a working relationship across a difficult outcome. Counterparts tend to trust you, which means they are more likely to share information that others never hear.",
        natural: "In a negotiation, you offer empathy, look for common ground, and are willing to concede a point to keep the conversation productive. You fill silence because it feels uncomfortable, and you tend to smooth things over before the underlying issue has been fully worked through. You often identify your own objections beforehand and leave them unspoken rather than risk the conflict that surfacing them might cause.",
        silence: "Silence feels like a threat, but it is actually leverage. The discipline is learning to hold it rather than spend it. The discomfort you feel when the room goes cold is the same discomfort the counterpart feels. Whoever fills that silence first typically gives something up. Your job in those moments is to let the other side go first. What feels like relational rupture is often just the other side waiting to see what you will offer.",
        failure: {
          trigger: "A counterpart who uses deliberate emotional withdrawal: silence, clipped responses, a shift from warm to transactional. The Accommodator reads this as the relationship breaking and moves immediately to repair it, often before assessing whether the rupture is real or manufactured. A skilled Assertive who simply stops being warm can trigger this instinct without even trying. The kryptonite is not silence in the abstract; it is the misreading of a cold room as a broken relationship.",
          mode: "The Accommodator offers a premature concession to restore warmth before the negotiation has fully begun. The result is resentful compliance: yes said to end the discomfort, followed by slow-rolled execution because the agreement never felt fair. A compounding risk: objections that were identified beforehand but left unspoken out of fear of conflict will still shape implementation, even though they never entered the room.",
          voss: "Recognize that silence is leverage, not a threat, and learn to hold it rather than spend it. Before making any concession, ask a question that transfers the burden back: something like 'how am I supposed to work with that?' slows the tempo and forces justification from the other side. Your objections need to be in the room. Both Assertives and Analysts need to hear them.",
          karrass: "Use a conditional yes to protect your position without requiring a confrontational no. 'We can do that, provided the timeline shifts.' The concession is contingent, the relationship is preserved, and your position enters the record. Every concession should be framed as a trade. Something given should always have something attached.",
        },
        stressNote: "Your default behavior becomes most visible when the relationship feels at risk. Under pressure, Accommodators tend to concede or smooth things over rather than holding position, which can leave important issues unresolved and create the impression that any aggressive posture will eventually yield ground.",
      },
      Assertive: {
        colorClass: "assertive",
        orientation: "Your default posture is oriented toward outcomes and time. You value clarity of result, move quickly toward decisions, and are comfortable staking out a position early. You read ambiguity as inefficiency and tend to interpret a lack of resolution as someone failing to do their job. In a negotiation, you often know what you want before the other side has finished talking.",
        strengths: "Momentum. You move fast, drive toward outcomes, and treat time as the primary currency. Your position is clear early, which means counterparts always know where they stand. You are decisive under pressure and rarely need a second conversation to say what a first conversation should have settled.",
        natural: "In a negotiation, you anchor early, push back hard when challenged, and keep the conversation moving toward resolution. You are direct about what you want and impatient with process that does not seem to be getting anywhere. You can read a room quickly for who has authority and who does not, and you tend to address the person who can make a decision rather than building consensus from the bottom up.",
        silence: "Every silence is an opportunity to speak more. The Assertive's discipline is to resist that urge. Silence is not indecision; it is presence. Holding a pause signals control rather than filling the space with words that burn leverage. The counterpart who speaks first after a difficult moment usually gives something up. Learning to sit in that discomfort without filling it is one of the highest-value skills an Assertive can develop.",
        failure: {
          trigger: "A data-fluent counterpart who is willing to hold the floor. A pure Analyst is manageable; they tend to go quiet and you fill the space. But an Analyst who holds their ground and deploys data systematically, without urgency or emotional signal, is a different problem. There is nothing to counter-punch. There is only evidence, calmly delivered, waiting to be addressed.",
          mode: "The Assertive reads the data-driven challenge as a challenge to their position and escalates, or gets irritated in a way that accelerates escalation. The instinct is to match force with force, but there is no force to match. The conversation becomes a contest over credibility, and the Assertive typically concedes ground without gaining any.",
          voss: "Consciously soften your tone. Rather than dismissing the data, try naming the dynamic: something like 'it seems like we are working from different sets of numbers' creates space for the other side to confirm or correct, and shifts the exchange from contest to dialogue. Probe the data position with questions rather than attacking it. The discipline here is tone, not argument.",
          karrass: "Do not take a data-anchored position at face value. Test it. Ask for the reasoning, the constraints, and the context. Even a well-prepared data position has soft spots. The principle is to out-learn, not out-argue. Preparation before the negotiation is your most reliable defense against being caught without an answer when someone deploys evidence you did not anticipate.",
        },
        stressNote: "Your default behavior becomes most visible under challenge or time pressure. When stakes are high, Assertives tend to push harder and interpret pushback as a challenge to be met rather than a signal to slow down. Silence is not your instinct, but it is often your most powerful available move.",
      },
    };

    // --- Tie combination descriptions ---

    const TIE_COMBOS = {
      "Analyst+Accommodator": {
        title: "Analyst and Accommodator",
        desc: "This combination tends toward caution on two fronts simultaneously. You wait for more information before acting, and you wait for clearer consensus before speaking. The result can be a posture that withholds both action and confrontation for longer than the situation warrants. Your strength is genuine attentiveness to both facts and people. The risk is that by the time you feel ready to say something, the window has passed."
      },
      "Analyst+Assertive": {
        title: "Analyst and Assertive",
        desc: "This combination is driven but conditional. You push for outcomes and move quickly, but you need data to back the move before you fully commit. The tension between impatience and the need for verification is a recurring internal conflict. At its best, this produces well-supported positions held firmly. Under pressure, it can produce oscillation between decisive action and sudden withdrawal to recheck assumptions."
      },
      "Accommodator+Assertive": {
        title: "Accommodator and Assertive",
        desc: "This combination drives for outcomes but pulls back when relationships seem at risk. You are comfortable staking out a position until the friction becomes personal, at which point the Accommodator instinct takes over and you look for a way to restore the relationship. This creates an exploitable pattern: counterparts who sense the shift can apply social pressure to move you off a position that was otherwise well-founded."
      },
    };

    // --- Utility ---
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // --- Render quiz ---
    const form = document.getElementById("quiz");
    function renderQuiz() {
      form.innerHTML = "";
      const frag = document.createDocumentFragment();
      const reqNote = document.createElement("div");
      reqNote.className = "required-note";
      reqNote.textContent = "All questions are required.";
      frag.appendChild(reqNote);

      QUESTIONS.forEach((qObj, idx) => {
        const item = document.createElement("div");
        item.className = "item";
        const qnum = document.createElement("div");
        qnum.className = "qnum";
        qnum.textContent = `Question ${idx + 1} of ${QUESTIONS.length}`;
        const q = document.createElement("div");
        q.className = "q";
        q.textContent = qObj.q;

        const options = shuffle(qObj.options.map(o => ({...o})));
        const optsWrap = document.createElement("div");
        optsWrap.className = "opts";
        options.forEach((opt, optIdx) => {
          const id = `q${idx}_opt${optIdx}`;
          const label = document.createElement("label");
          label.className = "opt";
          label.setAttribute("for", id);
          const input = document.createElement("input");
          input.type = "radio";
          input.name = `q${idx}`;
          input.id = id;
          input.value = opt.s;
          input.required = true;
          const span = document.createElement("span");
          span.textContent = opt.t;
          label.appendChild(input);
          label.appendChild(span);
          optsWrap.appendChild(label);
        });

        item.appendChild(qnum);
        item.appendChild(q);
        item.appendChild(optsWrap);
        frag.appendChild(item);
      });

      form.appendChild(frag);
    }
    renderQuiz();

    // --- Score bars HTML ---
    function renderScoreBars(counts, dominant, tiedStyles) {
      const total = QUESTIONS.length;
      const styles = ["Analyst", "Accommodator", "Assertive"];
      const sorted = [...styles].sort((a, b) => counts[b] - counts[a]);

      let html = `<div class="score-bars">
        <div class="score-bars-label">Score breakdown</div>`;

      sorted.forEach((s, rank) => {
        const pct = Math.round((counts[s] / total) * 100);
        let rankClass = rank === 0 ? "dominant" : rank === 1 ? "secondary" : "tertiary";
        if (tiedStyles && tiedStyles.length > 1 && tiedStyles.includes(s)) rankClass = "dominant";
        html += `
          <div class="score-row">
            <div class="score-name">${s}</div>
            <div class="score-track">
              <div class="score-fill ${s.toLowerCase()} ${rankClass}" style="width: ${pct}%"></div>
            </div>
            <div class="score-num">${counts[s]}</div>
          </div>`;
      });

      html += `</div>`;
      return html;
    }

    // --- Build single-style result HTML ---
    function buildSingleResult(dominant, secondary, counts) {
      const p = PROFILES[dominant];
      const sP = PROFILES[secondary];
      const tiedStyles = null;

      let html = `
        <div class="result-header">
          <div class="result-label">Your dominant negotiation style</div>
          <div class="result-title ${p.colorClass}">${dominant}</div>
        </div>
        ${renderScoreBars(counts, dominant, tiedStyles)}
        <div class="profile-body">

          <div class="profile-section">
            <div class="profile-section-head">Core orientation</div>
            <p>${p.orientation}</p>
          </div>

          <div class="strengths-block ${p.colorClass}">
            <div class="strengths-head">Strengths</div>
            <p>${p.strengths}</p>
          </div>

          <div class="profile-section">
            <div class="profile-section-head">What you do naturally in negotiation</div>
            <p>${p.natural}</p>
          </div>

          <div class="silence-block">
            <div class="silence-head">Managing silence</div>
            <p>${p.silence}</p>
          </div>

          <div class="failure-block">
            <div class="failure-block-head">${dominant} Kryptonite: Where This Style Tends to Fail</div>
            <div class="failure-section">
              <div class="failure-section-label">The trigger</div>
              <p>${p.failure.trigger}</p>
            </div>
            <div class="failure-section">
              <div class="failure-section-label">The failure mode</div>
              <p>${p.failure.mode}</p>
            </div>
            <div class="failure-section prescription">
              <div class="failure-section-label">What Chris Voss Would Say</div>
              <p>${p.failure.voss}</p>
            </div>
            <div class="failure-section prescription">
              <div class="failure-section-label">What Chester Karrass Would Say</div>
              <p>${p.failure.karrass}</p>
            </div>
          </div>

          <div class="stress-note">
            <div class="stress-note-head">Under pressure</div>
            <p>${p.stressNote}</p>
          </div>

          <div class="secondary-block">
            <div class="secondary-block-head">Your secondary style: ${secondary}</div>
            <p>${getSecondaryNote(dominant, secondary)}</p>
          </div>

        </div>
        ${renderAttribution()}
      `;
      return html;
    }

    // --- Build tie result HTML ---
    function buildTieResult(tiedStyles, counts) {
      const comboKey = getTieComboKey(tiedStyles);
      const combo = TIE_COMBOS[comboKey];
      const titleStr = tiedStyles.join(" / ");

      let html = `
        <div class="result-header">
          <div class="result-label">Your scores reflect a balanced split</div>
          <div class="result-title tie">${titleStr}</div>
        </div>
        ${renderScoreBars(counts, null, tiedStyles)}
        <div class="tie-block">
          <p class="tie-intro">A tied score is real information, not an inconclusive result. It means two orientations are close to equally active in how you read a situation. What follows describes how that particular combination tends to show up in practice.</p>
          ${combo ? `
          <div class="tie-styles">
            <div class="tie-style-card">
              <div class="tie-style-name">${combo.title}</div>
              <p>${combo.desc}</p>
            </div>
          </div>
          ` : `
          <div class="tie-styles">
            ${tiedStyles.map(s => `
            <div class="tie-style-card">
              <div class="tie-style-name" style="color:var(--${PROFILES[s].colorClass}-color)">${s}</div>
              <p>${PROFILES[s].orientation}</p>
            </div>`).join('')}
          </div>
          `}
          <div class="stress-note" style="margin-top:22px;">
            <div class="stress-note-head">Under pressure</div>
            <p>When time is short or stakes are high, one of these styles will typically surface as the default. Retake the assessment and answer as you would when the pressure is on. That version of the results is usually more diagnostic than this one.</p>
          </div>
        </div>
        ${renderAttribution()}
      `;
      return html;
    }

    function getTieComboKey(styles) {
      const sorted = [...styles].sort();
      return sorted.join("+");
    }

    function getSecondaryNote(dominant, secondary) {
      const combos = {
        "Analyst+Accommodator": "Your secondary Accommodator tendency means you are attentive to how people in the room are responding, even while you are primarily focused on the facts. This is an asset when your analytical conclusions need to be communicated to people who process information relationally. The risk is that this combination can make you reluctant to deliver an uncomfortable finding when the room clearly does not want to hear it.",
        "Analyst+Assertive": "Your secondary Assertive tendency means you are not simply waiting for perfect information. You have a drive to move toward resolution, and when you have enough data, you tend to move quickly. This combination can be effective in technical negotiations where preparation matters. The risk is impatience when your preparation is incomplete and the situation demands action anyway.",
        "Accommodator+Analyst": "Your secondary Analyst tendency means you are not simply managing relationships. You are also tracking whether things are actually correct, not just comfortable. This makes you more credible than a pure Accommodator because you will eventually push back when the facts do not hold up. The challenge is that you may do so slowly, after the moment of maximum leverage has passed.",
        "Accommodator+Assertive": "Your secondary Assertive tendency means you can drive hard for outcomes until the relationship cost becomes visible, at which point you tend to pull back. This combination can be read as inconsistent by counterparts who learn to apply social pressure when you have otherwise held a strong position.",
        "Assertive+Analyst": "Your secondary Analyst tendency means you are not simply pushing toward a result. You want the result to be defensible. This is a useful check on pure Assertive behavior, particularly in institutional settings where a bad decision made quickly has lasting consequences. The challenge is that this combination can stall at the point where more analysis would require more time than you are willing to spend.",
        "Assertive+Accommodator": "Your secondary Accommodator tendency means you are aware of the relational cost of hard positions, even when you hold them. You are more likely than a pure Assertive to adjust your approach when you sense you are creating unnecessary friction. This is an asset in long-term negotiations where the relationship has to survive the outcome."
      };
      const key = `${dominant}+${secondary}`;
      return combos[key] || `A secondary ${secondary} tendency means elements of that style also shape how you read situations, particularly as the dynamics shift.`;
    }

    function renderAttribution() {
      return `
        <div class="attribution">
          The three-style framework (Analyst, Accommodator, Assertive) is drawn from Chris Voss, <em>Never Split the Difference</em> (2016). The application of these styles to institutional leadership, team dynamics, and negotiation escalation is developed in Timothy Chester's series <em>Dispatches from an Internet Pioneer</em>, published on Substack. The series includes <a href="https://dispatchesinternetpioneer.substack.com/p/know-your-negotiation-style" target="_blank" rel="noopener">Know Your Negotiation Style</a>, <a href="https://dispatchesinternetpioneer.substack.com/p/the-hidden-ladder-in-every-negotiation" target="_blank" rel="noopener">The Hidden Ladder in Every Negotiation</a>, and <a href="https://dispatchesinternetpioneer.substack.com/p/b60bcdbd-6a51-4f3b-8617-51c677e38198" target="_blank" rel="noopener">Negotiation Styles and the Escalation Ladder</a>.
        </div>
      `;
    }

    // --- Scoring and submission ---
    const SUBMIT = document.getElementById("submitBtn");
    const ERROR = document.getElementById("formError");
    const RESULT = document.getElementById("result");

    function validateAllAnswered() {
      for (let i = 0; i < QUESTIONS.length; i++) {
        if (!form.querySelector(`input[name="q${i}"]:checked`)) return i;
      }
      return -1;
    }

    function scrollToFirstMissing(idx) {
      const target = form.querySelector(`input[name="q${idx}"]`);
      if (target) { target.scrollIntoView({ behavior: "smooth", block: "center" }); target.focus({ preventScroll: true }); }
    }

    SUBMIT.addEventListener("click", () => {
      ERROR.textContent = "";
      RESULT.hidden = true;
      const missing = validateAllAnswered();
      if (missing !== -1) {
        ERROR.textContent = `Please answer Question ${missing + 1} before submitting.`;
        scrollToFirstMissing(missing);
        return;
      }

      const counts = { Analyst: 0, Accommodator: 0, Assertive: 0 };
      for (let i = 0; i < QUESTIONS.length; i++) {
        counts[form.querySelector(`input[name="q${i}"]:checked`).value]++;
      }

      const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      const topScore = entries[0][1];
      const tied = entries.filter(e => e[1] === topScore).map(e => e[0]);

      let html;
      if (tied.length === 1) {
        const dominant = entries[0][0];
        const secondary = entries[1][0];
        html = buildSingleResult(dominant, secondary, counts);
      } else {
        html = buildTieResult(tied, counts);
      }

      RESULT.innerHTML = html;
      RESULT.hidden = false;

      // Scroll to results after layout is complete
      setTimeout(() => {
        RESULT.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 50);
    });

    // Warn before leaving if partially answered
    let interacted = false;
    document.addEventListener("change", () => { interacted = true; }, true);
    window.addEventListener("beforeunload", (e) => {
      if (interacted && form.querySelector("input[type=radio]:checked")) {
        e.preventDefault();
        e.returnValue = "";
      }
    });
  </script>
</body>
</html>
